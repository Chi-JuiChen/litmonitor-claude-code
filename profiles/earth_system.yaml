transferable_methods: >
  Machine learning for earth system emulation and surrogate modeling.
  Causal inference and attribution methods.
  Dimensionality reduction (EOF, PCA, autoencoders).
  Bayesian methods and uncertainty quantification.
  Graph neural networks for earth system interactions.

downgrade: >
  Narrow atmospheric dynamics with no broader earth system coupling.
  Local urban case studies.
  Pure paleoclimate without modern relevance.
  Social science and economics without climate science angle.

